<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JETLE.COM | Kayıt Ol</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="register" class="auth-page-body">
  <div id="appHeader"></div>

  <main class="auth-page-wrap">
    <section class="auth-card panel narrow-card">
      <a class="brand brand-inline" href="index.html" aria-label="JETLE.COM Anasayfa">
        <span class="brand-mark" aria-hidden="true">
          <span class="brand-icon-lines"><span></span><span></span><span></span></span>
          <span class="brand-icon-grid"><span></span><span></span><span></span><span></span></span>
        </span>
        <span class="brand-text">
          <strong>JETLE.COM</strong>
          <small>ilan platformu</small>
        </span>
      </a>

      <div class="auth-head">
        <h1>Hesap Oluştur</h1>
        <p>JETLE hesabınızı oluşturarak ilan yayınlamaya hemen başlayabilirsiniz.</p>
      </div>

      <form id="registerForm" class="form-stack">
        <div class="form-group">
          <label for="registerName">Ad Soyad</label>
          <input type="text" id="registerName" placeholder="Ad Soyad" required />
        </div>

        <div class="form-group">
          <label for="registerEmail">E-posta</label>
          <input type="email" id="registerEmail" placeholder="ornek@mail.com" required />
        </div>

        <div class="form-group">
          <label for="registerPassword">Şifre</label>
          <input type="password" id="registerPassword" placeholder="En az 6 karakter" required />
        </div>

        <button type="submit" class="btn btn-primary full-width" id="registerBtn">Hesap Oluştur</button>
      </form>

      <p class="auth-foot-note">Zaten hesabınız var mı? <a href="login.html">Giriş yap</a></p>
    </section>
  </main>

  <div id="appFooter"></div>
  <div class="toast" id="toast"></div>

  <script src="api.js?v=20260418"></script>
  <script src="script.js"></script>
  <script src="auth.js"></script>
  <script src="ilan.js"></script>
</body>
</html>
