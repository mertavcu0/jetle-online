<!DOCTYPE html>
<html lang="tr">
<head>

  <meta name="description" content="Favoriye eklediğiniz ilanları tek yerden görüntüleyin." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23ffffff'/%3E%3Ctext x='32' y='30' dominant-baseline='middle' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='24' fill='%231565D8'%3EJETLE%3C/text%3E%3Ctext x='32' y='50' dominant-baseline='middle' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='700' font-size='10' fill='%23111318'%3E.online%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="home-platform.css" />

<body class="page-favorites" data-auth-required="1">
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo logo--brand" aria-label="JETLE.online ana sayfa"><span class="logo__mark">JETLE</span><span class="logo__domain">.online</span></a>
      <nav class="header-actions" aria-label="Hızlı bağlantılar">
        <a href="index.html" class="header-link">Ana sayfa</a>
        <span id="headerUserSlot" class="header-user-slot"></span>
      </nav>
    </div>
  </header>

  <main class="main-shell">
    <section class="jetle-trust-strip" aria-label="Güven göstergeleri">
      <div class="jetle-trust-strip__inner">
        <span class="jetle-trust-strip__item"><span class="jetle-trust-strip__ic">✔</span>Doğrulanmış kullanıcılar</span>
        <span class="jetle-trust-strip__item"><span class="jetle-trust-strip__ic">✔</span>Güvenli alışveriş prensipleri</span>
        <span class="jetle-trust-strip__item"><span class="jetle-trust-strip__ic">✔</span>Hızlı onay süreci</span>
      </div>
    </section>

    <div class="container favorites-shell">
      <section class="favorites-hero panel">
        <h1>Favorilerim</h1>
        <p id="favoritesLead" class="text-muted">Kaydettiğiniz ilanları buradan takip edebilirsiniz.</p>
      </section>

      <section id="favoritesEmpty" class="panel favorites-empty" hidden>
        <p class="favorites-empty__title">Henüz favori ilan yok.</p>
        <p class="text-muted">Ana sayfada kalp ikonuna basarak beğendiğiniz ilanları favorilerinize ekleyin.</p>
        <a href="ilan-ver.html" class="btn btn-primary">İlk ilanı sen ekle</a>
      </section>

      <section id="favoritesGrid" class="listing-grid" aria-live="polite"></section>
    </div>
  </main>

  <script src="api.js?v=20260217"></script>
  <script src="jetle-api.js"></script>
  <script src="auth.js"></script>
  <script src="common.js"></script>
