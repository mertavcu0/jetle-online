<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — JETLE.online</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23ffffff'/%3E%3Ctext x='32' y='30' dominant-baseline='middle' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='24' fill='%231565D8'%3EJETLE%3C/text%3E%3Ctext x='32' y='50' dominant-baseline='middle' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='700' font-size='10' fill='%23111318'%3E.online%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .admin-app {
      display: flex;
      min-height: 100vh;
      background: #f4f5f7;
    }
    .admin-app__sidebar {
      width: 260px;
      flex-shrink: 0;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }
    .admin-app__brand {
      padding: 0 18px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 12px;
    }
    .admin-app__brand a {
      color: #fff;
      font-weight: 800;
      font-size: 1.1rem;
      text-decoration: none;
      letter-spacing: 0.02em;
    }
    .admin-app__brand a:hover {
      color: #93c5fd;
    }
    .admin-app__brand span {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 6px;
    }
    .admin-app__nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 0 10px;
      flex: 1;
    }
    .admin-app__nav a,
    .admin-app__nav button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 12px 14px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: #e2e8f0;
      font: inherit;
      cursor: pointer;
      text-decoration: none;
      box-sizing: border-box;
    }
    .admin-app__nav a:hover,
    .admin-app__nav button:hover {
      background: rgba(255, 255, 255, 0.08);
    }
    .admin-app__nav a:focus-visible,
    .admin-app__nav button:focus-visible {
      outline: 2px solid #3b82f6;
      outline-offset: 2px;
    }
    .admin-app__nav .admin-app__logout {
      margin-top: auto;
      color: #fca5a5;
    }
    .admin-app__nav .admin-app__logout:hover {
      background: rgba(248, 113, 113, 0.15);
    }
    .admin-app__main {
      flex: 1;
      min-width: 0;
      padding: 28px 32px;
    }
    .admin-app__main h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
      color: #0f172a;
    }
    .admin-app__main .lead {
      margin: 0;
      color: #64748b;
      font-size: 1rem;
    }
    .admin-app__hint {
      margin-top: 20px;
      padding: 16px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      max-width: 560px;
      color: #475569;
      font-size: 0.95rem;
    }
    .admin-html-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin: 16px 0 20px;
    }
    .admin-html-msg {
      margin: 0 0 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      background: #fff;
      border: 1px solid #e2e8f0;
      font-size: 0.95rem;
    }
    .admin-html-msg--err {
      background: #fdecea;
      border-color: #f5c6c0;
      color: #8a1c12;
    }
    .admin-html-table-wrap {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      overflow: auto;
      max-width: 100%;
    }
    .admin-html-table-wrap .data-table {
      margin: 0;
      min-width: 720px;
    }
    .admin-html-actions {
      white-space: nowrap;
    }
    .admin-html-actions .btn {
      margin-right: 0.35rem;
      margin-bottom: 0.25rem;
    }
    .admin-html-user {
      font-size: 0.85rem;
      color: #64748b;
    }
    @media (max-width: 720px) {
      .admin-app {
        flex-direction: column;
      }
      .admin-app__sidebar {
        width: 100%;
      }
      .admin-app__nav .admin-app__logout {
        margin-top: 12px;
      }
    }
  </style>
</head>
<body data-page="admin" class="page-admin">
  <script src="api.js?v=20260217"></script>
  <script src="auth.js"></script>
  <script>
    (function () {
      if (!window.JetleAPI || !window.JetleAuth) {
        window.location.replace("login.html?next=" + encodeURIComponent("admin.html"));
        return;
      }
      JetleAPI.init();
      JetleAuth.init();
      if (!JetleAuth.isLoggedIn()) {
        window.location.replace("login.html?next=" + encodeURIComponent("admin.html"));
        return;
      }
      if (!JetleAuth.isAdmin()) {
        window.location.replace("index.html");
        return;
      }
    })();
  </script>

  <div class="admin-app">
    <aside class="admin-app__sidebar" aria-label="Admin menüsü">
      <div class="admin-app__brand">
        <a href="index.html">JETLE.online</a>
        <span>Admin Panel</span>
      </div>
      <nav class="admin-app__nav">
        <a href="admin.html" aria-current="page">İlanlar</a>
        <a href="admin-panel.html">Klasik moderasyon</a>
        <button type="button" id="adminViewUsers">Kullanıcıları gör</button>
        <button type="button" class="admin-app__logout" id="adminLogoutBtn">Çıkış</button>
      </nav>
    </aside>
    <main class="admin-app__main" id="adminMainArea">
      <h1>İlan moderasyonu</h1>
      <p class="lead">Sunucudaki tüm ilanlar; onay, red ve silme işlemleri jetle-backend API üzerinden yapılır.</p>
      <div class="admin-html-toolbar">
        <button type="button" class="btn btn-secondary btn-sm" id="adminHtmlRefresh">Listeyi yenile</button>
      </div>
      <p id="adminHtmlMsg" class="admin-html-msg" hidden></p>
      <div id="adminHtmlTableWrap" class="admin-html-table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Başlık</th>
              <th>Şehir</th>
              <th>Fiyat</th>
              <th>Kullanıcı</th>
              <th>Tarih</th>
              <th>Durum</th>
              <th>İşlemler</th>
            </tr>
          </thead>
          <tbody id="adminHtmlTbody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
    (function () {
      if (!window.JetleAuth || !window.JetleAPI) return;

      var main = document.getElementById("adminMainArea");
      var listingsDefaultHtml = main ? main.innerHTML : "";

      function $(id) {
        return document.getElementById(id);
      }

      function statusLabelTr(s) {
        if (s === "pending") return "Onay bekliyor";
        if (s === "approved") return "Yayında";
        if (s === "rejected") return "Reddedildi";
        if (s === "draft") return "Taslak";
        if (s === "passive") return "Pasif";
        return s || "—";
      }

      function statusClass(s) {
        if (s === "approved") return "status-badge status-badge--ok";
        if (s === "pending") return "status-badge status-badge--wait";
        if (s === "rejected") return "status-badge status-badge--no";
        if (s === "passive") return "status-badge status-badge--off";
        return "status-badge";
      }

      function formatDate(iso) {
        if (!iso) return "—";
        try {
          return new Date(iso).toLocaleString("tr-TR", { dateStyle: "short", timeStyle: "short" });
        } catch (e) {
          return String(iso);
        }
      }

      function formatPrice(n) {
        if (n == null || n === "" || !Number.isFinite(Number(n))) return "—";
        try {
          return Number(n).toLocaleString("tr-TR", { style: "currency", currency: "TRY", maximumFractionDigits: 0 });
        } catch (e2) {
          return String(n);
        }
      }

      function showMsg(text, isErr) {
        var el = $("adminHtmlMsg");
        if (!el) return;
        if (!text) {
          el.hidden = true;
          el.textContent = "";
          return;
        }
        el.hidden = false;
        el.textContent = text;
        el.className = "admin-html-msg" + (isErr ? " admin-html-msg--err" : "");
      }

      function loadAdminListings() {
        var tbody = $("adminHtmlTbody");
        var wrap = $("adminHtmlTableWrap");
        if (!tbody || !wrap) return;
        tbody.innerHTML = "";

        if (!JetleAPI.backendEnabled || !JetleAPI.backendEnabled()) {
          showMsg("Admin listesi için backend açık olmalı (JetleAPI).", true);
          wrap.hidden = true;
          return;
        }

        var res = JetleAPI.adminFetchListings();
        if (!res.ok) {
          showMsg(res.message || "Liste yüklenemedi.", true);
          wrap.hidden = false;
          return;
        }

        var body = res.data;
        var rows = body && Array.isArray(body.data) ? body.data : [];
        if (!rows.length) {
          showMsg("Kayıtlı ilan yok.", false);
          wrap.hidden = false;
          return;
        }

        showMsg("", false);
        wrap.hidden = false;

        rows.forEach(function (row) {
          var tr = document.createElement("tr");
          var tdTitle = document.createElement("td");
          tdTitle.textContent = row.title || "—";
          var tdCity = document.createElement("td");
          tdCity.textContent = row.city || "—";
          var tdPrice = document.createElement("td");
          tdPrice.textContent = formatPrice(row.price);
          var tdUser = document.createElement("td");
          tdUser.className = "admin-html-user";
          tdUser.textContent = row.userId ? "ID: " + String(row.userId) : "—";
          var tdDate = document.createElement("td");
          tdDate.className = "text-small";
          tdDate.textContent = formatDate(row.createdAt);
          var tdStatus = document.createElement("td");
          var badge = document.createElement("span");
          badge.className = statusClass(row.status);
          badge.textContent = statusLabelTr(row.status);
          tdStatus.appendChild(badge);
          var tdAct = document.createElement("td");
          tdAct.className = "admin-html-actions";

          function btn(label, cls, onClick) {
            var b = document.createElement("button");
            b.type = "button";
            b.className = "btn btn-sm " + cls;
            b.textContent = label;
            b.addEventListener("click", onClick);
            return b;
          }

          tdAct.appendChild(
            btn("Onayla", "btn-primary", function () {
              var r = JetleAPI.adminApproveListing(row.id);
              if (!r.ok) {
                showMsg(r.message || "Onaylanamadı.", true);
                return;
              }
              JetleAPI.notifyListingsChanged();
              loadAdminListings();
            })
          );
          tdAct.appendChild(
            btn("Reddet", "btn-secondary", function () {
              var r = JetleAPI.adminRejectListing(row.id);
              if (!r.ok) {
                showMsg(r.message || "Reddedilemedi.", true);
                return;
              }
              JetleAPI.notifyListingsChanged();
              loadAdminListings();
            })
          );
          tdAct.appendChild(
            btn("Sil", "btn-secondary", function () {
              if (!window.confirm("Bu ilanı kalıcı olarak silmek istiyor musunuz?")) return;
              var r = JetleAPI.adminDeleteListing(row.id);
              if (!r.ok) {
                showMsg(r.message || "Silinemedi.", true);
                return;
              }
              JetleAPI.notifyListingsChanged();
              loadAdminListings();
            })
          );

          tr.appendChild(tdTitle);
          tr.appendChild(tdCity);
          tr.appendChild(tdPrice);
          tr.appendChild(tdUser);
          tr.appendChild(tdDate);
          tr.appendChild(tdStatus);
          tr.appendChild(tdAct);
          tbody.appendChild(tr);
        });
      }

      document.getElementById("adminViewUsers").addEventListener("click", function () {
        if (!main) return;
        main.innerHTML =
          "<h1>Kullanıcılar</h1>" +
          '<p class="lead">Kayıtlı kullanıcı listesi</p>' +
          '<p class="admin-app__hint">Kullanıcı detayları ve düzenleme ileride bu alana bağlanacak. Tam liste için <code>GET /api/admin/users</code> kullanılabilir.</p>' +
          '<p><button type="button" class="btn btn-secondary btn-sm" id="adminBackHome">İlanlara dön</button></p>';
        var back = document.getElementById("adminBackHome");
        if (back) {
          back.addEventListener("click", function () {
            main.innerHTML = listingsDefaultHtml;
            loadAdminListings();
            var ref = document.getElementById("adminHtmlRefresh");
            if (ref) ref.addEventListener("click", loadAdminListings);
          });
        }
      });

      document.getElementById("adminLogoutBtn").addEventListener("click", function () {
        JetleAuth.logout();
        window.location.href = "index.html";
      });

      document.addEventListener("DOMContentLoaded", function () {
        if (document.body.getAttribute("data-page") !== "admin") return;
        var ref = document.getElementById("adminHtmlRefresh");
        if (ref) ref.addEventListener("click", loadAdminListings);
        loadAdminListings();
      });
    })();
  </script>
</body>
</html>
