<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — JETLE.online</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23ffffff'/%3E%3Ctext x='32' y='30' dominant-baseline='middle' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='24' fill='%231565D8'%3EJETLE%3C/text%3E%3Ctext x='32' y='50' dominant-baseline='middle' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='700' font-size='10' fill='%23111318'%3E.online%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .admin-simple-welcome {
      padding: 1.5rem 0;
    }
    .admin-simple-welcome__lead {
      font-size: 1.1rem;
      margin: 0.5rem 0 0;
      color: var(--text-muted, #5c6370);
    }
    a.admin-nav-item {
      display: block;
      text-align: left;
      text-decoration: none;
      color: inherit;
      width: 100%;
      border: none;
      background: transparent;
      font: inherit;
      cursor: pointer;
    }
    a.admin-nav-item:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body data-page="admin" class="page-admin">
  <script src="api.js?v=20260217"></script>
  <script src="auth.js"></script>
  <script>
    (function () {
      if (!window.JetleAuth) {
        window.location.replace("login.html?next=" + encodeURIComponent("admin.html"));
        return;
      }
      JetleAuth.init();
      if (!JetleAuth.isLoggedIn()) {
        window.location.replace("login.html?next=" + encodeURIComponent("admin.html"));
        return;
      }
      if (!JetleAuth.isAdmin()) {
        window.location.replace("index.html");
        return;
      }
    })();
  </script>

  <header class="site-header site-header--simple">
    <div class="container header-inner">
      <a href="index.html" class="logo logo--brand" aria-label="JETLE.online ana sayfa"><span class="logo__mark">JETLE</span><span class="logo__domain">.online</span></a>
      <nav class="header-actions">
        <a href="index.html" class="header-link">Siteye dön</a>
        <span id="headerUserSlot" class="header-user-slot"></span>
      </nav>
    </div>
  </header>

  <div class="admin-frame">
    <aside class="admin-nav panel" aria-label="Yönetim menüsü">
      <p class="admin-nav-title">Menü</p>
      <a href="admin-panel.html" class="admin-nav-item">İlanları Yönet</a>
      <button type="button" class="admin-nav-item" id="adminSimpleNavUsers">Kullanıcılar</button>
      <button type="button" class="admin-nav-item" id="adminSimpleLogout">Çıkış</button>
    </aside>
    <main class="admin-main admin-simple-welcome">
      <h1 class="page-title">Admin Panel</h1>
      <p class="admin-simple-welcome__lead">Hoş geldin Admin</p>
    </main>
  </div>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© JETLE.online</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    (function () {
      if (!window.JetleAuth) return;
      var out = document.getElementById("adminSimpleLogout");
      if (out) {
        out.addEventListener("click", function () {
          JetleAuth.logout();
          window.location.href = "index.html";
        });
      }
    })();
  </script>
</body>
</html>
