<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Paneli — JETLE.online</title>
  <meta name="description" content="JETLE.online yönetici ve hesap paneli: ilanlar, mesajlar, favoriler ve profil ayarları." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23ffffff'/%3E%3Ctext x='32' y='30' dominant-baseline='middle' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='24' fill='%231565D8'%3EJETLE%3C/text%3E%3Ctext x='32' y='50' dominant-baseline='middle' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='700' font-size='10' fill='%23111318'%3E.online%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="tr-cities.css" />
  <style>
    .dashboard {
      display: flex;
      align-items: stretch;
      min-height: 0;
    }
    @media (max-width: 900px) {
      .dashboard {
        flex-direction: column;
      }
      .sidebar {
        width: 100% !important;
        border-right: none;
        border-bottom: 1px solid #eee;
      }
    }
    .sidebar {
      width: 240px;
      border-right: 1px solid #eee;
      padding: 20px;
      flex-shrink: 0;
      box-sizing: border-box;
    }
    .sidebar .dash-tab {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 5px;
      color: #333;
      text-decoration: none;
      border: none;
      background: transparent;
      font: inherit;
      cursor: pointer;
    }
    .sidebar .dash-tab:hover {
      background: #f3f4f6;
    }
    .sidebar .dash-tab.is-active {
      background: rgba(37, 99, 235, 0.1);
      color: #1d4ed8;
      font-weight: 600;
    }
    .main {
      flex: 1;
      padding: 25px;
      min-width: 0;
      box-sizing: border-box;
    }
    .empty-box {
      text-align: center;
      margin-top: 50px;
    }
    .empty-box p {
      margin: 0 0 16px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #333;
    }
    .empty-box button,
    .empty-box a {
      background: #2563eb;
      color: #fff;
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      text-decoration: none;
      display: inline-block;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .empty-box a:hover {
      background: #1d4ed8;
      color: #fff;
    }
    .dash-panel {
      margin: 0;
    }
    .dash-panel__head--tight {
      margin-bottom: 12px;
    }
    .dash-panel__head--tight .dash-panel__title {
      margin: 0 0 4px;
      font-size: 1.25rem;
    }
    .dash-filters--pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .dash-filters--pills .listing-filter {
      border-radius: 999px;
    }
    .dash-messages {
      margin-top: 4px;
    }
  </style>
</head>
<body data-page="dashboard" class="page-dashboard">
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo logo--brand" aria-label="JETLE.online ana sayfa"><span class="logo__mark">JETLE</span><span class="logo__domain">.online</span></a>
      <nav class="header-actions">
        <span id="headerUserSlot" class="header-user-slot"></span>
      </nav>
    </div>
  </header>

  <main class="main-shell main-shell--dash">
    <div class="container dashboard">
      <aside class="sidebar" aria-label="Hesap menüsü">
        <p class="text-small text-muted" style="margin:0 0 12px;font-weight:600" id="dashAdminLabel" hidden>Yönetici: Admin Paneli</p>
        <nav class="dash-sidebar__nav" role="tablist" aria-label="Panel menüsü">
          <button type="button" class="dash-tab is-active" data-tab="listings" id="dashTabListings" role="tab" aria-selected="true">İlanlarım</button>
          <button type="button" class="dash-tab" data-tab="messages" id="dashTabMessages" role="tab" aria-selected="false">Mesajlarım</button>
          <button type="button" class="dash-tab" data-tab="favorites" id="dashTabFavorites" role="tab" aria-selected="false">Favorilerim</button>
          <button type="button" class="dash-tab" data-tab="profile" id="dashTabProfile" role="tab" aria-selected="false">Profil Ayarları</button>
        </nav>
      </aside>

      <div class="main">
        <section id="tab-listings" class="dash-panel" data-panel="listings" aria-labelledby="dashTabListings">
          <div class="dash-panel__head dash-panel__head--tight">
            <h2 class="dash-panel__title">İlanlarım</h2>
          </div>
          <div class="subtab-row dash-filters dash-filters--pills" role="group" aria-label="İlan durumu">
            <button type="button" class="btn btn-secondary btn-sm listing-filter is-active" data-status="all">Tümü</button>
            <button type="button" class="btn btn-secondary btn-sm listing-filter" data-status="approved">Yayında</button>
            <button type="button" class="btn btn-secondary btn-sm listing-filter" data-status="pending">Onay bekliyor</button>
            <button type="button" class="btn btn-secondary btn-sm listing-filter" data-status="rejected">Reddedilen</button>
            <button type="button" class="btn btn-secondary btn-sm listing-filter" data-status="passive">Pasif</button>
          </div>
          <div id="myListingsMount" class="dash-my-listings"></div>
        </section>

        <section id="tab-messages" class="dash-panel" hidden data-panel="messages" aria-labelledby="dashTabMessages">
          <div class="dash-panel__head dash-panel__head--tight">
            <h2 class="dash-panel__title">Mesajlarım</h2>
          </div>
          <div class="dash-messages">
            <aside class="dash-messages__threads panel panel--flat" id="dashThreads" aria-label="Konuşma listesi"></aside>
            <section class="dash-messages__chat panel panel--flat">
              <div id="dashChatHead" class="dash-chat__head text-small text-muted">Konuşma seçin</div>
              <div id="dashChatBody" class="dash-chat__body"></div>
              <form id="dashChatForm" class="dash-chat__form">
                <input type="text" id="dashChatInput" placeholder="Yanıtınızı yazın" autocomplete="off" />
                <button type="submit" class="btn btn-primary btn-sm">Gönder</button>
              </form>
            </section>
          </div>
        </section>

        <section id="tab-favorites" class="dash-panel" hidden data-panel="favorites" aria-labelledby="dashTabFavorites">
          <div class="dash-panel__head dash-panel__head--tight">
            <h2 class="dash-panel__title">Favorilerim</h2>
          </div>
          <div id="favGrid" class="dash-fav-grid"></div>
        </section>

        <section id="tab-profile" class="dash-panel" hidden data-panel="profile" aria-labelledby="dashTabProfile">
          <div class="dash-panel__head dash-panel__head--tight">
            <h2 class="dash-panel__title">Profil ayarlarım</h2>
          </div>
          <div class="panel profile-form profile-form--dash">
            <div class="field">
              <label for="profName">Ad soyad</label>
              <input type="text" id="profName" autocomplete="name" />
            </div>
            <div class="field">
              <label for="profEmail">E-posta</label>
              <input type="email" id="profEmail" readonly class="input-readonly" title="E-posta değişikliği için destek ile iletişime geçin" />
            </div>
            <div class="field-row field-row--2">
              <div class="field">
                <label for="profPhone">Telefon</label>
                <input type="tel" id="profPhone" autocomplete="tel" />
              </div>
              <div class="field">
                <label for="profProfileType">Profil tipi</label>
                <select id="profProfileType">
                  <option value="Bireysel">Bireysel</option>
                  <option value="Kurumsal">Kurumsal</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label for="profRoleLine">Hesap rolü</label>
              <input type="text" id="profRoleLine" readonly class="input-readonly" />
            </div>
            <div class="field-row field-row--2">
              <div class="field">
                <label for="profCity">Şehir</label>
                <input type="text" id="profCity" autocomplete="address-level1" />
              </div>
              <div class="field">
                <label for="profDistrict">İlçe</label>
                <input type="text" id="profDistrict" autocomplete="address-level2" />
              </div>
            </div>
            <button type="button" class="btn btn-primary" id="profSave">Bilgileri kaydet</button>
            <p id="profMsg" class="text-small text-muted" hidden></p>

            <div class="profile-password panel panel--flat">
              <h3 class="profile-password__title">Şifre değiştir</h3>
              <div class="field">
                <label for="profPwCurrent">Mevcut şifre</label>
                <input type="password" id="profPwCurrent" autocomplete="current-password" />
              </div>
              <div class="field-row field-row--2">
                <div class="field">
                  <label for="profPwNew">Yeni şifre</label>
                  <input type="password" id="profPwNew" autocomplete="new-password" />
                </div>
                <div class="field">
                  <label for="profPwNew2">Yeni şifre (tekrar)</label>
                  <input type="password" id="profPwNew2" autocomplete="new-password" />
                </div>
              </div>
              <button type="button" class="btn btn-secondary btn-sm" id="profPwBtn">Şifreyi güncelle</button>
              <p id="profPwMsg" class="text-small text-muted" hidden></p>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© JETLE.online</p>
    </div>
  </footer>

  <script src="api.js?v=20260217"></script>
  <script src="auth.js"></script>
  <script src="tr-cities.js"></script>
  <script src="tr-cities-ui.js"></script>
  <script src="ilan.js"></script>
  <script src="script.js"></script>
  <script>
    (function () {
      if (!window.JetleAuth || typeof JetleAuth.bootstrap !== "function") return;
      JetleAuth.bootstrap().then(function () {
        if (!JetleAuth.isLoggedIn()) {
          window.location.replace("login.html?next=" + encodeURIComponent("dashboard.html"));
          return;
        }
        var me = JetleAuth.getCurrentUser && JetleAuth.getCurrentUser();
        var lbl = document.getElementById("dashAdminLabel");
        if (me && String(me.role || "").toLowerCase() === "admin" && lbl) {
          lbl.hidden = false;
        }
      });
    })();
  </script>
</body>
</html>
