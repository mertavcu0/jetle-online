<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="jetle-api-base" content="https://jetle-online-production.up.railway.app" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <title>İlan detayı — JETLE.online</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23ffffff'/%3E%3Ctext x='32' y='30' dominant-baseline='middle' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='24' fill='%231565D8'%3EJETLE%3C/text%3E%3Ctext x='32' y='50' dominant-baseline='middle' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='700' font-size='10' fill='%23111318'%3E.online%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .ilan-detail-wrap { max-width: 720px; margin: 0 auto; }
    .ilan-detail-images { display: flex; flex-wrap: wrap; gap: 12px; margin: 1.25rem 0; }
    .ilan-detail-images img { max-width: min(280px, 100%); border-radius: 8px; object-fit: cover; border: 1px solid rgba(15, 23, 42, 0.08); }
    #detailDescription { white-space: pre-wrap; line-height: 1.65; margin-top: 1rem; }
  </style>
</head>
<body class="page-detail font-inter">
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo logo--brand" aria-label="JETLE.online ana sayfa"><span class="logo__mark">JETLE</span><span class="logo__domain">.online</span></a>
      <nav class="header-actions" aria-label="Hızlı bağlantılar">
        <span id="headerUserSlot" class="header-user-slot"></span>
      </nav>
    </div>
  </header>

  <main class="main-shell">
    <div class="container ilan-detail-wrap">
      <p class="text-small text-muted" style="margin-bottom: 1rem;">
        <a href="index.html" style="color: inherit; text-decoration: underline;">← Ana sayfaya dön</a>
      </p>

      <div id="detailLoading" class="panel panel--flat" aria-live="polite">İlan yükleniyor…</div>

      <div id="detailError" class="panel panel--flat" hidden>
        <p id="detailErrorText" class="text-muted">İlan bulunamadı.</p>
        <a href="index.html" class="btn btn-primary btn-sm" style="margin-top: 0.75rem;">Ana sayfaya dön</a>
      </div>

      <article id="detailRoot" class="panel panel--flat" hidden>
        <h1 id="detailTitle" class="text-h2" style="margin-top: 0;">—</h1>
        <p id="detailPrice" class="listing-card__price" style="font-size: 1.25rem; margin: 0.5rem 0;">—</p>
        <p id="detailCity" class="text-muted" style="margin: 0;">—</p>
        <div id="detailImages" class="ilan-detail-images" aria-label="İlan görselleri"></div>
        <h2 class="text-h3" style="margin-bottom: 0.5rem;">Açıklama</h2>
        <div id="detailDescription"></div>
      </article>
    </div>
  </main>

  <script src="api.js?v=20260217"></script>
  <script src="auth.js"></script>
  <script src="script.js"></script>
  <script src="ilan-detail.js"></script>
</body>
</html>
