<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="jetle-api-base" content="https://jetle-online-production.up.railway.app" />
  <title>İlan ver — JETLE.online</title>
  <meta name="description" content="JETLE.online üzerinde yeni ilan oluşturun; onay sonrası yayına alınır." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23ffffff'/%3E%3Ctext x='32' y='30' dominant-baseline='middle' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='24' fill='%231565D8'%3EJETLE%3C/text%3E%3Ctext x='32' y='50' dominant-baseline='middle' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='700' font-size='10' fill='%23111318'%3E.online%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="ilan-ver" class="page-form page-ilan-ver font-inter">
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo logo--brand" aria-label="JETLE.online ana sayfa"><span class="logo__mark">JETLE</span><span class="logo__domain">.online</span></a>
      <div class="header-spacer"></div>
      <nav class="header-actions">
        <span id="headerUserSlot" class="header-user-slot"></span>
        <a href="index.html" class="header-link">Ana sayfa</a>
      </nav>
    </div>
  </header>

  <main class="main-shell main-shell--ilan-ver">
    <div class="container ilan-ver-layout">
      <section class="ilan-ver-card panel" aria-labelledby="ilanVerHeading">
        <h1 id="ilanVerHeading" class="ilan-ver-card__title">Ücretsiz ilan ver</h1>
        <p class="ilan-ver-card__lead text-muted text-small">
          İlanınız moderasyon ekibince incelenir; onaylandığında yalnızca onaylı ilanlar listesinde görünür.
        </p>

        <form id="ilanVerForm" class="ilan-ver-form" novalidate>
          <div class="field">
            <label for="ilanTitle">İlan başlığı</label>
            <input type="text" id="ilanTitle" name="title" required maxlength="200" placeholder="Örn. 2018 model SUV, sıfır ayarında" autocomplete="off" />
          </div>
          <div class="field">
            <label for="ilanDesc">Açıklama</label>
            <textarea id="ilanDesc" name="description" rows="6" required maxlength="8000" placeholder="Ürün veya hizmeti detaylı anlatın."></textarea>
          </div>
          <div class="field-row ilan-ver-form__row2">
            <div class="field">
              <label for="ilanPrice">Fiyat (₺)</label>
              <input type="number" id="ilanPrice" name="price" required min="0" step="1" inputmode="numeric" placeholder="0" />
            </div>
            <div class="field">
              <label for="ilanCategory">Kategori</label>
              <select id="ilanCategory" name="category" required>
                <option value="">Seçin</option>
                <option value="Vasıta">Vasıta</option>
                <option value="Emlak">Emlak</option>
                <option value="Alışveriş">Alışveriş</option>
                <option value="Hizmetler">Hizmetler</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label for="ilanCity">Şehir</label>
            <select id="ilanCity" name="city" required>
              <option value="">Şehir seçin</option>
            </select>
          </div>
          <div class="field">
            <label for="ilanPhotos">Fotoğraflar (isteğe bağlı)</label>
            <input type="file" id="ilanPhotos" name="photos" accept="image/jpeg,image/png,image/webp,.jpg,.jpeg,.png,.webp" multiple />
            <p class="text-small text-muted" style="margin: 6px 0 0">İlk sürümde kayıt sunucuya yalnızca metin alanlarıyla gider; fotoğraf alanı yakında tam entegre edilecek.</p>
          </div>
          <div class="ilan-ver-form__actions">
            <button type="submit" class="btn btn-ilan-ver-primary" id="ilanVerSubmit">İlanı gönder</button>
            <a href="index.html" class="btn btn-secondary">Vazgeç</a>
          </div>
        </form>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© JETLE.online</p>
    </div>
  </footer>

  <script src="api.js?v=20260217"></script>
  <script src="auth.js"></script>
  <script src="ilan-ver-form.js"></script>
  <script src="script.js"></script>
</body>
</html>
