<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İlanlar | jetle.online</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #f8f9fa;
      color: #111827;
    }

    .topbar {
      width: 100%;
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 14px 24px;
      margin-bottom: 20px;
    }

    .topbar-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 20px;
      font-weight: 800;
      text-decoration: none;
    }

    .jetle {
      color: #2563eb;
    }

    .online {
      color: #111827;
    }

    .page {
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr);
      max-width: 1200px;
      margin: 0 auto 28px;
      gap: 18px;
      padding: 0 14px;
    }

    .sidebar {
      background: #fff;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      height: fit-content;
      position: sticky;
      top: 20px;
      width: 250px;
    }

    .sidebar h3 {
      margin: 0 0 12px;
      font-size: 16px;
    }

    .sidebar label {
      display: block;
      margin-top: 12px;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
    }

    .sidebar input,
    .sidebar select {
      width: 100%;
      padding: 8px 9px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      outline: none;
    }

    .sidebar input:focus,
    .sidebar select:focus {
      border-color: #2563eb;
    }

    .price-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .sidebar button {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
    }

    .category-links {
      display: grid;
      gap: 6px;
      margin: 0 0 12px;
    }

    .category-links a {
      display: block;
      padding: 9px 10px;
      border-radius: 6px;
      background: #fff;
      border: 1px solid #e5e7eb;
      color: #374151;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
    }

    .category-links a:hover {
      background: #f1f5ff;
      color: #2563eb;
      border-color: #bfdbfe;
    }

    .content-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .content-head h1 {
      margin: 0;
      font-size: 19px;
    }

    .listing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }

    .listing-card {
      position: relative;
      background: white;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #e5e7eb;
      transition: box-shadow 0.18s ease;
      cursor: pointer;
      padding: 8px;
    }

    .listing-card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .card-img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      display: block;
      border-radius: 4px;
    }

    .fav-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 0;
      background: rgba(255,255,255,0.92);
      color: #9ca3af;
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      transition: 0.2s;
    }

    .fav-btn:hover {
      transform: scale(1.08);
    }

    .fav-btn.active {
      color: #e03131;
    }

    .card-body {
      padding: 8px 2px 0;
    }

    .card-body h3 {
      font-size: 13px;
      line-height: 1.3;
      margin: 0 0 5px;
    }

    .card-body p {
      margin: 4px 0;
      color: #2563eb;
      font-weight: 700;
      font-size: 15px;
    }

    .card-body span {
      color: #555;
      font-size: 12px;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 6px;
    }

    .seller-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
    }

    .seller-badge.verified {
      background: #dcfce7;
      color: #166534;
    }

    .seller-badge.premium {
      background: #fef3c7;
      color: #92400e;
    }

    .seller-badge.corporate {
      background: #dbeafe;
      color: #1e40af;
    }

    .loading-state,
    .empty-state {
      grid-column: 1 / -1;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 32px 18px;
      text-align: center;
      color: #6b7280;
      box-shadow: 0 10px 24px rgba(15,23,42,0.06);
    }

    .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      margin: 0 auto 12px;
      animation: spin 0.8s linear infinite;
    }

    .empty-state h3 {
      margin: 0 0 6px;
      color: #111827;
      font-size: 18px;
    }

    .empty-state p {
      margin: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 920px) {
      .page {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: relative;
        top: auto;
      }

      .listing-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .listing-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <a class="logo" href="/">
        <span class="jetle">jetle</span><span class="online">.online</span>
      </a>
      <div id="authArea"></div>
    </div>
  </div>

  <div class="page">
    <aside class="sidebar">
      <h3>Filtrele</h3>

      <div class="category-links">
        <a href="listings.html?category=emlak">Emlak İlanları</a>
        <a href="listings.html?category=vasita">Vasıta İlanları</a>
        <a href="listings.html?category=elektronik">Elektronik İlanları</a>
      </div>

      <label>Arama</label>
      <input type="text" id="searchInput" placeholder="Ne arıyorsun?">

      <label>Kategori</label>
      <select id="filterCategory">
        <option value="">Tümü</option>
        <option value="emlak">Emlak</option>
        <option value="vasita">Vasıta</option>
        <option value="elektronik">Elektronik</option>
      </select>

      <label>Şehir</label>
      <input type="text" id="filterCity" placeholder="Şehir yaz">

      <label>Fiyat</label>
      <div class="price-row">
        <input type="number" id="minPrice" placeholder="Min">
        <input type="number" id="maxPrice" placeholder="Max">
      </div>

      <button id="applyFilter">Filtrele</button>
    </aside>

    <main class="content">
      <div class="content-head">
        <h1 id="pageTitle">İlanlar</h1>
      </div>
      <div id="listingContainer" class="listing-grid"></div>
    </main>
  </div>

  <script src="/auth-global.js"></script>
  <script src="/listings.js"></script>
</body>
</html>
