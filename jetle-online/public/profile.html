<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil | Jetle</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #f4f6f8;
      color: #111827;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .navbar {
      height: 64px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    .brand {
      color: #2563eb;
      font-size: 22px;
      font-weight: 800;
      text-decoration: none;
    }

    .page {
      max-width: 1050px;
      margin: 0 auto;
      padding: 24px;
    }

    .profile-card,
    .listings-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.05);
    }

    .profile-card {
      display: grid;
      gap: 14px;
      margin-bottom: 18px;
    }

    .profile-main h1 {
      margin: 0 0 4px;
      font-size: 24px;
    }

    .profile-main p {
      margin: 0;
      color: #6b7280;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stat-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 14px;
      font-weight: 700;
    }

    .stat-card span {
      display: block;
      margin-top: 4px;
      color: #2563eb;
      font-size: 22px;
    }

    .listings-card h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .listing-item {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid #eef0f3;
    }

    .listing-item:last-child {
      border-bottom: 0;
    }

    .listing-item strong {
      display: block;
      margin-bottom: 4px;
    }

    .listing-item p {
      margin: 0;
      color: #6b7280;
      font-size: 13px;
    }

    .listing-item a {
      align-self: center;
      white-space: nowrap;
      padding: 8px 10px;
      border-radius: 8px;
      background: #eff6ff;
      color: #2563eb;
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
    }

    .empty {
      padding: 14px;
      background: #f9fafb;
      border: 1px dashed #d1d5db;
      border-radius: 10px;
      color: #6b7280;
    }

    @media (max-width: 720px) {
      .navbar { padding: 0 16px; }
      .page { padding: 16px; }
      .stats-grid { grid-template-columns: 1fr; }
      .listing-item { flex-direction: column; }
      .listing-item a { align-self: flex-start; }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <a class="brand" href="/">jetle.online</a>
    <div id="authArea"></div>
  </header>

  <main class="page">
    <section class="profile-card">
      <div class="profile-main">
        <h1 id="profileName">Profil</h1>
        <p id="profileEmail"></p>
      </div>

      <div class="stats-grid">
        <div class="stat-card">Toplam ilan <span id="totalListings">0</span></div>
        <div class="stat-card">Aktif ilan <span id="activeListings">0</span></div>
      </div>
    </section>

    <section class="listings-card">
      <h2>Bu kullanıcının ilanları</h2>
      <div id="listings"></div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const userId = params.get("userId");

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatPrice(value) {
      return Number(value || 0).toLocaleString("tr-TR") + " TL";
    }

    function renderListing(item) {
      return `
        <div class="listing-item">
          <div>
            <strong>${escapeHtml(item.title || "Başlıksız ilan")}</strong>
            <p>${escapeHtml(item.city || "Şehir yok")} - ${formatPrice(item.price)}</p>
          </div>
          <a href="/listing-detail.html?id=${item._id}">Görüntüle</a>
        </div>
      `;
    }

    async function loadProfile() {
      if (!userId) {
        document.querySelector(".page").innerHTML = `<div class="empty">Kullanıcı bulunamadı.</div>`;
        return;
      }

      const userRes = await fetch(`/api/users/${userId}`);
      if (!userRes.ok) throw new Error("Kullanıcı bilgisi alınamadı");
      const user = await userRes.json();

      document.getElementById("profileName").innerText = user.name || "Jetle Kullanıcısı";
      document.getElementById("profileEmail").innerText = user.email || "";
      document.getElementById("totalListings").innerText = user.totalListings || 0;
      document.getElementById("activeListings").innerText = user.activeListings || 0;

      const listingsRes = await fetch(`/api/users/${userId}/listings`);
      if (!listingsRes.ok) throw new Error("İlanlar alınamadı");
      const listings = await listingsRes.json();

      document.getElementById("listings").innerHTML = listings.length
        ? listings.map(renderListing).join("")
        : `<div class="empty">Bu kullanıcının yayında ilanı yok.</div>`;
    }

    loadProfile().catch((err) => {
      document.querySelector(".page").innerHTML = `<div class="empty">${escapeHtml(err.message)}</div>`;
    });
  </script>
  <script src="/auth-global.js"></script>
</body>
</html>
