<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kullanıcı Detayı | Jetle Admin</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f5f7fb;
      color: #111827;
      font-family: Inter, Arial, sans-serif;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,0.92);
      border-bottom: 1px solid #e5e7eb;
      backdrop-filter: blur(14px);
    }

    .topbar-inner,
    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 20px;
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      margin: 0;
      font-size: 20px;
      font-weight: 900;
    }

    .brand span {
      color: #2563eb;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border: 0;
      border-radius: 12px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      cursor: pointer;
      font-weight: 800;
      transition: all 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(37,99,235,0.18);
    }

    .btn-ghost {
      background: #fff;
      color: #374151;
      border: 1px solid #e5e7eb;
    }

    .page-head {
      margin: 18px 0;
    }

    .page-head h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .muted {
      color: #6b7280;
      font-size: 13px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 18px;
    }

    .card,
    .panel {
      background: #fff;
      border: 1px solid #eef2f7;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15,23,42,0.06);
    }

    .card {
      padding: 18px;
    }

    .stat-label {
      margin: 0 0 10px;
      color: #6b7280;
      font-size: 13px;
      font-weight: 800;
    }

    .stat-value {
      margin: 0;
      font-size: 24px;
      font-weight: 900;
    }

    .panel {
      padding: 18px;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 18px;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .seller-badge,
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
    }

    .seller-badge.verified,
    .status-pill.approved {
      background: #dcfce7;
      color: #166534;
    }

    .seller-badge.premium,
    .status-pill.pending {
      background: #fef3c7;
      color: #92400e;
    }

    .seller-badge.corporate {
      background: #dbeafe;
      color: #1e40af;
    }

    .status-pill.rejected,
    .status-pill.banned {
      background: #fee2e2;
      color: #991b1b;
    }

    .list-grid {
      display: grid;
      gap: 12px;
    }

    .listing-card {
      display: grid;
      grid-template-columns: 112px 1fr 160px;
      gap: 16px;
      align-items: center;
      padding: 14px;
      border: 1px solid #eef2f7;
      border-radius: 14px;
      background: #fff;
    }

    .listing-card img {
      width: 112px;
      height: 84px;
      border-radius: 10px;
      object-fit: cover;
      background: #f3f4f6;
    }

    .title {
      margin: 0 0 8px;
      font-weight: 900;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: #6b7280;
      font-size: 13px;
    }

    .price {
      text-align: right;
      font-size: 20px;
      font-weight: 900;
    }

    .loading,
    .empty-state {
      padding: 34px 16px;
      text-align: center;
      color: #6b7280;
      background: #f9fafb;
      border-radius: 12px;
    }

    @media (max-width: 760px) {
      .topbar-inner,
      .panel-head {
        align-items: stretch;
        flex-direction: column;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .listing-card {
        grid-template-columns: 88px 1fr;
      }

      .listing-card img {
        width: 88px;
        height: 72px;
      }

      .price {
        grid-column: 1 / -1;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <h1 class="brand"><span>Jetle</span> Admin</h1>
      <a class="btn btn-ghost" href="admin-dashboard.html">Panele dön</a>
    </div>
  </header>

  <main class="page">
    <section class="page-head">
      <h1 id="userTitle">Kullanıcı Detayı</h1>
      <p class="muted" id="userEmail">Yükleniyor...</p>
    </section>

    <section class="stats-grid">
      <div class="card">
        <p class="stat-label">Toplam ilan</p>
        <p class="stat-value" id="totalListings">0</p>
      </div>
      <div class="card">
        <p class="stat-label">Kayıt tarihi</p>
        <p class="stat-value" id="registeredAt">-</p>
      </div>
      <div class="card">
        <p class="stat-label">Ban durumu</p>
        <p class="stat-value" id="banStatus">-</p>
      </div>
      <div class="card">
        <p class="stat-label">Rozetler</p>
        <div id="badges" class="badge-row"></div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Kullanıcının ilanları</h2>
      </div>
      <div class="list-grid" id="listings"></div>
    </section>
  </main>

  <script>
    const API_BASE = "";
    const token = localStorage.getItem("token");
    const id = new URLSearchParams(window.location.search).get("id");

    if (!token) {
      window.location.href = "/jetle-v2/admin.html";
    }

    function authHeaders(extra = {}) {
      return {
        ...extra,
        Authorization: "Bearer " + localStorage.getItem("token")
      };
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatPrice(price) {
      const n = Number(price || 0);
      return new Intl.NumberFormat("tr-TR").format(n) + " TL";
    }

    function badgeLabel(badge) {
      return {
        verified: "✔ Onaylı",
        premium: "⭐ Premium",
        corporate: "🏢 Kurumsal"
      }[badge] || badge;
    }

    function renderBadges(badges) {
      if (!badges.length) return `<span class="muted">Rozet yok</span>`;
      return badges.map((badge) => `<span class="seller-badge ${badge}">${badgeLabel(badge)}</span>`).join("");
    }

    function statusPill(status) {
      const value = status || "pending";
      const labels = {
        pending: "Onay bekliyor",
        approved: "Onaylı",
        rejected: "Reddedildi"
      };
      return `<span class="status-pill ${value}">${labels[value] || value}</span>`;
    }

    function listingImage(item) {
      const raw =
        (Array.isArray(item.images) && item.images[0]) ||
        item.image ||
        "https://picsum.photos/160/120";
      const src = String(raw).trim();

      if (src.startsWith("http://") || src.startsWith("https://") || src.startsWith("data:")) {
        return src;
      }

      return API_BASE + "/" + src.replace(/^\/+/, "");
    }

    async function loadUserDetail() {
      const list = document.getElementById("listings");
      list.innerHTML = `<div class="loading">Kullanıcı detayları yükleniyor...</div>`;

      const res = await fetch(`${API_BASE}/api/admin/users/${id}`, {
        headers: authHeaders()
      });

      if (res.status === 401 || res.status === 403) {
        localStorage.removeItem("token");
        window.location.href = "/jetle-v2/admin.html";
        return;
      }

      const data = await res.json();

      if (!res.ok) {
        list.innerHTML = `<div class="empty-state">${escapeHtml(data.error || "Kullanıcı bulunamadı")}</div>`;
        return;
      }

      const user = data.user || {};
      document.getElementById("userTitle").textContent = user.name || user.username || "İsimsiz kullanıcı";
      document.getElementById("userEmail").textContent = user.email || "-";
      document.getElementById("totalListings").textContent = data.totalListings || 0;
      document.getElementById("registeredAt").textContent = data.registeredAt
        ? new Date(data.registeredAt).toLocaleDateString("tr-TR")
        : "-";
      document.getElementById("banStatus").innerHTML = data.isBanned
        ? `<span class="status-pill banned">Banlı</span>`
        : `<span class="status-pill approved">Aktif</span>`;
      document.getElementById("badges").innerHTML = renderBadges(data.badges || []);

      const listings = Array.isArray(data.listings) ? data.listings : [];

      if (!listings.length) {
        list.innerHTML = `<div class="empty-state">Bu kullanıcının ilanı yok.</div>`;
        return;
      }

      list.innerHTML = listings.map((item) => `
        <article class="listing-card">
          <img src="${listingImage(item)}" alt="${escapeHtml(item.title || "İlan görseli")}">
          <div>
            <p class="title">${escapeHtml(item.title || "Başlıksız ilan")}</p>
            <div class="meta">
              <span>${escapeHtml(item.city || "Şehir yok")}</span>
              <span>${escapeHtml(item.category || "Kategori yok")}</span>
              ${statusPill(item.status)}
            </div>
          </div>
          <div class="price">${formatPrice(item.price)}</div>
        </article>
      `).join("");
    }

    loadUserDetail().catch((err) => {
      document.getElementById("listings").innerHTML = `<div class="empty-state">${escapeHtml(err.message)}</div>`;
    });
  </script>
  <script src="/auth-global.js"></script>
</body>
</html>
