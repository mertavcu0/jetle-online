<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giriş Yap | jetle.online</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
    }

    .login-page {
      background: #f3f4f6;
      font-family: Arial, sans-serif;
    }

    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      width: 380px;
      background: #fff;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      border: 1px solid #e5e7eb;
    }

    .login-logo {
      text-align: center;
      font-size: 24px;
      margin-bottom: 20px;
    }

    .logo-blue {
      color: #2563eb;
      font-weight: 700;
    }

    .logo-black {
      color: #111;
    }

    .login-card h2 {
      text-align: center;
      margin: 0 0 20px;
      font-size: 22px;
      color: #111827;
    }

    .login-card input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .login-card input:hover {
      border-color: #c7d2fe;
    }

    .login-card input:focus {
      border-color: #2563eb;
      outline: none;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.16);
    }

    .login-card button {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(37,99,235,0.22);
      transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .login-card button:hover {
      background: #1e40af;
      box-shadow: 0 8px 20px rgba(37,99,235,0.28);
      transform: translateY(-1px);
    }

    .login-links {
      text-align: center;
      margin-top: 15px;
    }

    .login-links a {
      color: #2563eb;
      text-decoration: none;
      font-size: 13px;
    }

    .login-links a:hover {
      text-decoration: underline;
    }

    .login-links p {
      margin: 10px 0 0;
      font-size: 13px;
      color: #4b5563;
    }

    .login-bottom {
      text-align: center;
      margin-top: 20px;
    }

    .login-bottom p {
      font-size: 13px;
      color: #666;
      margin: 0 0 6px;
    }

    .register-link {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 8px;
      background: #f3f4f6;
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s ease;
    }

    .register-link:hover {
      background: #e5e7eb;
    }
  </style>
</head>
<body class="login-page">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <span class="logo-blue">jetle</span><span class="logo-black">.online</span>
      </div>

      <h2>Giriş Yap</h2>

      <form id="loginForm">
        <input type="email" id="email" placeholder="E-posta adresi" required>
        <input type="password" id="password" placeholder="Şifre" required>
        <button type="submit">Giriş Yap</button>
      </form>

      <div class="login-links">
        <a href="#">Şifremi unuttum</a>
      </div>

      <div class="login-bottom">
        <p>Hesabın yok mu?</p>
        <a href="register.html" class="register-link">Kayıt Ol</a>
      </div>
    </div>
  </div>

  <script src="/login.js"></script>
  <script src="/auth-global.js"></script>
</body>
</html>
