<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sık Sorulan Sorular - jetle.online</title>
  <style>
    body {
      background-color: #f2f3f5;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 750px;
      margin: 40px auto 50px;
      background: #fff;
      padding: 40px 45px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      text-decoration: none;
    }

    .jetle {
      color: #007bff;
    }

    .online {
      color: #111;
    }

    .menu a {
      margin-left: 20px;
      text-decoration: none;
      color: #333;
      font-size: 14px;
    }

    .menu a:hover {
      color: #007bff;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
      color: #222;
    }

    .aciklama {
      font-size: 14px;
      color: #666;
      margin-bottom: 25px;
    }

    .empty-box {
      text-align: center;
      padding: 40px 20px;
      border: 1px dashed #ddd;
      border-radius: 8px;
      background: #fafafa;
    }

    .empty-box h3 {
      margin-bottom: 10px;
      color: #333;
    }

    .empty-box p {
      font-size: 14px;
      color: #777;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      color: #007bff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .container > p:first-of-type,
    .placeholder,
    .empty-box {
      display: none !important;
    }

    .coming-soon {
      text-align: center;
      padding: 30px;
      color: #777;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html" class="logo">
      <span class="jetle">jetle</span><span class="online">.online</span>
    </a>

    <div class="menu">
      <a href="index.html">Ana Sayfa</a>
      <a href="ilan-ver.html">İlan Ver</a>
      <a href="#">Profil</a>
      <a href="#">Giriş</a>
    </div>
  </div>

  <main class="container">
    <h1>Sık Sorulan Sorular</h1>
    <p>Bu sayfa hazırlanıyor.</p>
    <p class="aciklama">Sıkça sorulan sorular burada listelenecektir. Henüz soru bulunmamaktadır.</p>
    <div class="empty-box">
      <h3>Henüz soru yok</h3>
      <p>Kullanıcılar soru sormaya başladığında burada görüntülenecek.</p>
    </div>
    <a href="/index.html">Ana sayfaya dön</a>
    <div class="coming-soon">
      <p>İçerikler yakında eklenecektir.</p>
    </div>
  </main>
  <script src="/auth-global.js"></script>
</body>
</html>
