<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panelim | jetle.online</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f3f4f6;
      color: #111827;
      font-family: Arial, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
    }

    .navbar-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 10px 14px;
      display: grid;
      grid-template-columns: 150px minmax(320px, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .logo {
      color: #2563eb;
      font-size: 24px;
      font-weight: 900;
    }

    .logo span {
      color: #111827;
    }

    .search {
      display: flex;
      min-width: 0;
    }

    .search input {
      width: 100%;
      height: 42px;
      padding: 0 14px;
      border: 1px solid #d1d5db;
      border-right: 0;
      border-radius: 8px 0 0 8px;
      background: #f9fafb;
      outline: none;
    }

    .search button {
      height: 42px;
      padding: 0 18px;
      border: 0;
      border-radius: 0 8px 8px 0;
      background: #2563eb;
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }

    .nav-right,
    #authArea {
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    #authArea a,
    #authArea button,
    .post-btn {
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    #authArea button {
      border: 1px solid #d1d5db;
      background: #fff;
      color: #374151;
    }

    .user-email {
      max-width: 170px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 700;
    }

    .post-btn {
      background: #2563eb;
      color: #fff;
    }

    .dashboard-shell {
      max-width: 1180px;
      margin: 20px auto;
      padding: 0 14px;
      display: grid;
      grid-template-columns: 230px 1fr;
      gap: 18px;
      align-items: start;
    }

    .sidebar,
    .content-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }

    .sidebar {
      position: sticky;
      top: 76px;
      padding: 16px;
    }

    .sidebar h3 {
      margin: 0 0 14px;
      color: #111827;
      font-size: 17px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      border-radius: 8px;
      color: #374151;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .menu-item.active,
    .menu-item:hover {
      background: #f3f4f6;
      color: #1d4ed8;
    }

    .content-card {
      padding: 16px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-head h1 {
      margin: 0;
      font-size: 20px;
    }

    .muted {
      color: #6b7280;
      font-size: 13px;
    }

    .listing-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .listing-card,
    .card {
      position: relative;
      display: flex;
      gap: 15px;
      background: #fff;
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .listing-card:hover,
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.07);
    }

    .listing-card img,
    .card img {
      width: 140px;
      height: 100px;
      object-fit: cover;
      flex: 0 0 140px;
      border-radius: 8px;
      background: #e5e7eb;
    }

    .listing-info,
    .card-body {
      flex: 1;
      min-width: 0;
    }

    .listing-info h4,
    .card h3 {
      margin: 0 0 7px;
      font-size: 15px;
      line-height: 1.25;
    }

    .listing-price,
    .price {
      margin-top: 5px;
      color: #1c7ed6;
      font-size: 16px;
      font-weight: 900;
    }

    .listing-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0;
      color: #666;
      font-size: 12px;
    }

    .listing-meta span {
      padding: 0;
      border-radius: 0;
      background: transparent;
      color: inherit;
      font-size: inherit;
      font-weight: 600;
    }

    .actions,
    .listing-actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .actions a,
    .actions button,
    .listing-actions a,
    .listing-actions button {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      text-align: center;
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-view,
    .actions a,
    .listing-actions a {
      background: #f1f3f5;
      color: #374151;
    }

    .btn-edit,
    .actions button:first-of-type,
    .listing-actions button:first-of-type {
      background: #e7f5ff;
      color: #1c7ed6;
    }

    .btn-delete,
    .actions button:last-of-type,
    .listing-actions button:last-of-type {
      background: #fff5f5;
      color: #e03131;
    }

    .listing-actions a:hover,
    .listing-actions button:hover,
    .actions a:hover,
    .actions button:hover {
      transform: translateY(-1px);
      filter: brightness(0.98);
    }

    .empty-state h4 {
      margin: 0 0 6px;
      color: #111827;
      font-size: 17px;
    }

    .empty-state p {
      margin: 0 0 14px;
    }

    .empty-state button {
      padding: 9px 14px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }

    .empty-state {
      padding: 42px 16px;
      border: 1px dashed #d1d5db;
      border-radius: 10px;
      background: #f9fafb;
      color: #6b7280;
      text-align: center;
    }

    .placeholder {
      display: none;
      padding: 42px 16px;
      color: #6b7280;
      text-align: center;
    }

    @media (max-width: 900px) {
      .navbar-inner,
      .dashboard-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }

      .listing-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .listing-card,
      .card {
        display: block;
      }

      .listing-card img,
      .card img {
        width: 100%;
        height: 170px;
        margin-bottom: 10px;
      }

      .nav-right {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="navbar-inner">
      <a class="logo" href="/index.html">jetle<span>.online</span></a>
      <form class="search" action="/listings.html" method="get">
        <input type="text" name="search" placeholder="Kelime, ilan no veya kategori ara">
        <button type="submit">Ara</button>
      </form>
      <div class="nav-right">
        <div id="authArea"></div>
        <a href="/create-listing.html" class="post-btn">İlan Ver</a>
      </div>
    </div>
  </header>

  <main class="dashboard-shell">
    <aside class="sidebar">
      <h3>Hesabım</h3>
      <a href="/dashboard.html" class="menu-item active">📋 Benim İlanlarım</a>
      <a href="/create-listing.html" class="menu-item">➕ Yeni İlan Ver</a>
      <a href="/messages.html" class="menu-item"><i class="ri-chat-1-line"></i> Mesajlar</a>
      <a href="/favorites.html" class="menu-item"><i class="ri-heart-line"></i> Favoriler</a>
      <a href="/account.html" class="menu-item"><i class="ri-user-settings-line"></i> Hesap Ayarları</a>
    </aside>

    <section class="content-card" id="listingsPanel">
      <div class="section-head">
        <div>
          <h1>Benim İlanlarım</h1>
          <p class="muted">Yayınladığın ilanları burada takip edebilirsin.</p>
        </div>
      </div>
      <div id="myListingsGrid" class="listing-grid"></div>
      <template id="dashboardListingCardTemplate">
        <div class="listing-card">
          <img src="${listing.image}" />

          <div class="listing-info">
            <h4>${listing.title}</h4>

            <div class="listing-meta">
              <span>📍 ${listing.city}</span>
              <span>📂 ${listing.category}</span>
            </div>

            <div class="listing-price">${listing.price} TL</div>

            <div class="listing-actions">
              <a class="btn-view" href="/listing-detail.html?id=${listing._id}">Görüntüle</a>
              <button class="btn-edit" onclick="editListing('${listing._id}')">Düzenle</button>
              <button class="btn-delete" onclick="deleteListing('${listing._id}')">Sil</button>
            </div>
          </div>
        </div>
      </template>
    </section>

    <section class="content-card placeholder" id="messagesPanel">
      <h1>Mesajlar</h1>
      <p>Mesajlar bölümü yakında aktif olacak.</p>
    </section>
  </main>

  <script src="/auth-global.js"></script>
  <script src="/dashboard.js"></script>
  <script>
    (function () {
      const grid = document.getElementById("myListingsGrid");
      if (!grid) return;

      function upgradeListingCards() {
        grid.querySelectorAll(".card").forEach((card) => {
          card.classList.add("listing-card");
          card.querySelector(".card-body")?.classList.add("listing-info");
          card.querySelector(".price")?.classList.add("listing-price");

          const muted = card.querySelector(".muted");
          if (muted && !muted.classList.contains("listing-meta")) {
            const parts = muted.textContent.split("/").map((item) => item.trim()).filter(Boolean);
            muted.className = "listing-meta";
            muted.innerHTML = `
              <span>📍 ${parts[0] || ""}</span>
              <span>📂 ${parts[1] || ""}</span>
            `;
          }

          const actions = card.querySelector(".actions");
          if (actions) {
            actions.classList.add("listing-actions");
            actions.querySelector("a")?.classList.add("btn-view");
            const buttons = actions.querySelectorAll("button");
            buttons[0]?.classList.add("btn-edit");
            buttons[1]?.classList.add("btn-delete");
          }
        });

        grid.querySelectorAll(".empty-state").forEach((empty) => {
          if (empty.dataset.enhanced) return;
          const text = empty.textContent.toLowerCase();
          if (text.includes("yüklen") || text.includes("yüklen")) return;
          empty.dataset.enhanced = "true";
          empty.innerHTML = `
            <h4>Henüz ilanınız yok</h4>
            <p>Hemen ilan vererek satışa başlayın</p>
            <button onclick="location.href='/create-listing.html'">İlan Ver</button>
          `;
        });
      }

      new MutationObserver(upgradeListingCards).observe(grid, { childList: true, subtree: true });
      upgradeListingCards();
    })();
  </script>
</body>
</html>
