<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesajlar | Jetle</title>
  <style>
    body {
      margin: 0;
      background: #f5f6f8;
      font-family: Inter, Arial, sans-serif;
      color: #111827;
    }

    .messages-layout {
      max-width: 1100px;
      margin: 28px auto;
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 520px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      overflow: hidden;
    }

    .conversation-list {
      border-right: 1px solid #e5e7eb;
      background: #f9fafb;
      padding: 14px;
    }

    .conversation-list h2,
    .chat-panel h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .msg-card {
      max-width: 78%;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 10px;
      margin-bottom: 10px;
      box-shadow: 0 6px 18px rgba(15,23,42,0.06);
    }

    .msg-card.mine {
      margin-left: auto;
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-card.theirs {
      margin-right: auto;
      background: #fff;
      color: #111827;
      border-bottom-left-radius: 4px;
    }

    .msg-card strong {
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .msg-card small,
    .empty {
      color: #6b7280;
      font-size: 13px;
    }

    .msg-card.mine small {
      color: rgba(255,255,255,0.78);
    }

    .chat-panel {
      padding: 16px;
    }

    @media (max-width: 760px) {
      .messages-layout {
        grid-template-columns: 1fr;
        margin: 12px;
      }

      .conversation-list {
        border-right: 0;
        border-bottom: 1px solid #e5e7eb;
      }
    }
  </style>
</head>
<body>
  <div class="messages-layout">
    <div class="conversation-list">
      <h2>Mesajlar</h2>
      <div id="messagesList" class="empty">Mesajlar yükleniyor...</div>
    </div>

    <div class="chat-panel">
      <h2>Chat listesi</h2>
      <p class="empty">Bir mesaj seçildiğinde konuşma detayı burada gösterilecek.</p>
    </div>
  </div>

  <script src="/auth-global.js"></script>
  <script>
    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function loadMessages() {
      const user = JSON.parse(localStorage.getItem("user") || "{}");
      const userKey = user.id || user._id || user.email;
      const list = document.getElementById("messagesList");

      if (!userKey) {
        window.location.href = "/login.html";
        return;
      }

      try {
        const res = await fetch(`/api/messages/${encodeURIComponent(userKey)}`);
        if (!res.ok) throw new Error("Mesajlar alınamadı");

        const data = await res.json();
        list.innerHTML = data.length
          ? data.map((item) => `
            <div class="msg-card ${item.sender === userKey ? "mine" : "theirs"}">
              <strong>${escapeHtml(item.sender === userKey ? item.receiver : item.sender)}</strong>
              <p>${escapeHtml(item.message)}</p>
              <small>${new Date(item.createdAt).toLocaleString("tr-TR")}</small>
            </div>
          `).join("")
          : `<div class="empty">Henüz mesajınız yok.</div>`;
      } catch (err) {
        list.innerHTML = `<div class="empty">Mesajlar yüklenemedi.</div>`;
      }
    }

    loadMessages();
  </script>
</body>
</html>
