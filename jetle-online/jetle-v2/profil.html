<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profilim</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="top-nav">
    <div class="top-nav__inner">
      <a class="top-nav__logo" href="index.html">Jetle</a>
      <a class="top-nav__link" href="index.html">Ana Sayfa</a>
      <a class="top-nav__link" href="index.html#ilanForm">İlan Ver</a>
      <a class="top-nav__link" href="profil.html">Profil</a>
      <span class="top-nav__spacer"></span>
      <a class="top-nav__link" href="login.html">Giriş</a>
      <a class="top-nav__link" href="#" onclick="localStorage.removeItem('token'); location.href='index.html'; return false;">Çıkış</a>
    </div>
  </nav>
  <div class="header">
    <div class="logo">
      <span class="jetle">Jetle</span><span class="dot">.</span><span class="online">online</span>
    </div>
  </div>
  <h1>İlanlarım</h1>
  <div id="profileBadge"></div>
  <button onclick="favoriler()">Favorilerim</button>
  <div id="myListings"></div>

  <script>
    function getBadgeText(badge) {
      if (badge === "verified") return "Doğrulanmış";
      if (badge === "trusted") return "Güvenilir Satıcı";
      return "";
    }

    const user = JSON.parse(localStorage.getItem("user") || "{}");
    document.getElementById("profileBadge").innerHTML = `
      <div class="profile-badge ${user.badge || ""}">
        ${getBadgeText(user.badge)}
      </div>
    `;

    async function loadMyListings() {
      const res = await fetch("/api/my-listings", {
        headers: {
          Authorization: "Bearer " + localStorage.getItem("token")
        }
      });

      const data = await res.json();
      const container = document.getElementById("myListings");

      container.innerHTML = "";

      data.forEach(item => {
        const div = document.createElement("div");

        div.innerHTML = `
          <h3>${item.title}</h3>
          <p>${item.price} ₺</p>
          <button onclick="sil('${item._id}')">Sil</button>
        `;

        container.appendChild(div);
      });
    }

    function favoriler() {
      fetch("/api/favorites", {
        headers: {
          Authorization: "Bearer " + localStorage.getItem("token")
        }
      })
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("myListings");
        container.innerHTML = "";

        data.forEach(item => {
          const div = document.createElement("div");
          div.innerHTML = `
            <h3>${item.title}</h3>
            <p>${item.price} ₺</p>
          `;
          container.appendChild(div);
        });
      });
    }

    function sil(id) {
      fetch("/api/listings/" + id, {
        method: "DELETE",
        headers: {
          Authorization: "Bearer " + localStorage.getItem("token")
        }
      }).then(() => loadMyListings());
    }

    loadMyListings();
  </script>
</body>
</html>
