<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JETLE.COM | Reklam Ver</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="ad-form">
  <div id="appHeader"></div>

  <main class="page-shell">
    <section class="container single-column-layout">
      <div class="panel page-heading-panel">
        <h1>JETLE'da Reklam Ver</h1>
        <p>Markanızı JETLE kullanıcılarıyla buluşturmak için kısa formu doldurun, size özel reklam teklifimizi iletelim.</p>
      </div>

      <section class="panel form-panel">
        <div class="panel-head">
          <h2>Reklam Talep Formu</h2>
        </div>
        <form id="adRequestForm" class="listing-form-grid">
          <div class="form-group">
            <label for="adContactName">Ad Soyad</label>
            <input type="text" id="adContactName" required />
          </div>

          <div class="form-group">
            <label for="adEmail">Email</label>
            <input type="email" id="adEmail" required />
          </div>

          <div class="form-group">
            <label for="adPhone">Telefon</label>
            <input type="text" id="adPhone" required />
          </div>

          <div class="form-group">
            <label for="adCompany">Firma adı</label>
            <input type="text" id="adCompany" required />
          </div>

          <div class="form-group full-span">
            <label for="adType">Reklam türü</label>
            <select id="adType" required>
              <option value="">Seçiniz</option>
              <option value="Banner">Banner</option>
              <option value="Liste üstü">Liste üstü</option>
              <option value="Sponsorlu ilan">Sponsorlu ilan</option>
            </select>
          </div>

          <div class="form-group full-span">
            <label for="adNote">Açıklama</label>
            <textarea id="adNote" rows="5" placeholder="Kampanyanız, hedefiniz veya yayın talebiniz hakkında kısa bilgi yazın." required></textarea>
          </div>

          <div class="form-actions-row full-span">
            <button type="submit" class="btn btn-primary">Teklif Al</button>
          </div>
        </form>
      </section>
    </section>
  </main>

  <div id="appFooter"></div>
  <div class="toast" id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore-compat.js"></script>
  <script src="api.js?v=20260418"></script>
  <script src="script.js"></script>
  <script src="auth.js"></script>
  <script src="ilan.js"></script>
</body>
</html>
